<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Countdown</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #0b0d12;
    --card-bg: #161a22;
    --card-border: #262b36;
    --text: #f2f4f8;
    --muted: #8b93a3;
    --accent: #5eead4;
    --passed-bg: #12141a;
    --passed-text: #55606f;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    min-height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  body {
    padding: 3rem 1.25rem 4rem;
  }
  h1 {
    text-align: center;
    font-size: clamp(1.5rem, 4vw, 2.25rem);
    font-weight: 600;
    margin: 0 0 2.5rem;
    letter-spacing: -0.02em;
  }
  .grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 1rem;
    max-width: 480px;
    margin: 0 auto;
  }
  .year-header {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    color: var(--muted);
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    margin: 1.5rem 0 -0.25rem;
  }
  .year-header:first-child {
    margin-top: 0;
  }
  .year-header::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--card-border);
  }
  .card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 14px;
    padding: 1.5rem 1.25rem;
    text-align: center;
    transition: opacity 0.3s ease;
  }
  .card.passed {
    background: var(--passed-bg);
    border-color: var(--card-border);
    opacity: 0.55;
  }
  .date-label {
    font-size: 1rem;
    font-weight: 600;
    color: var(--muted);
    margin-bottom: 1rem;
    letter-spacing: 0.01em;
  }
  .card.passed .date-label {
    color: var(--passed-text);
  }
  .timer {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 0.6rem 0.5rem;
  }
  .unit {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: 2.9rem;
  }
  .unit .value {
    font-variant-numeric: tabular-nums;
    font-size: clamp(1.4rem, 4vw, 1.9rem);
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
  }
  .card.passed .unit .value {
    color: var(--passed-text);
  }
  .unit .label {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-top: 0.35rem;
  }
  .passed-text {
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--passed-text);
  }
  footer {
    text-align: center;
    color: var(--muted);
    font-size: 0.75rem;
    margin-top: 3rem;
  }
</style>
</head>
<body>

<h1>Countdown</h1>
<div class="grid" id="grid"></div>
<footer>Updates live &middot; times shown in your local timezone</footer>

<script>
  // 6:00 AM Pacific Daylight Time (UTC-7) — all target dates fall within DST
  const targetDates = [
    "2026-09-15T06:00:00-07:00",
    "2026-09-19T06:00:00-07:00",
    "2026-09-20T06:00:00-07:00",
    "2026-10-23T06:00:00-07:00",
    "2027-09-15T06:00:00-07:00",
    "2027-09-19T06:00:00-07:00",
    "2027-10-23T06:00:00-07:00"
  ].map(d => new Date(d)).sort((a, b) => a - b);

  const grid = document.getElementById('grid');

  let lastYear = null;
  const cards = targetDates.map(date => {
    const year = date.getFullYear();
    if (year !== lastYear) {
      const yearHeader = document.createElement('div');
      yearHeader.className = 'year-header';
      yearHeader.textContent = year;
      grid.appendChild(yearHeader);
      lastYear = year;
    }

    const card = document.createElement('div');
    card.className = 'card';

    const label = document.createElement('div');
    label.className = 'date-label';
    label.textContent = date.toLocaleDateString(undefined, { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' }) + ' · 6:00 AM PT';
    card.appendChild(label);

    const timer = document.createElement('div');
    timer.className = 'timer';
    card.appendChild(timer);

    grid.appendChild(card);
    return { date, card, timer };
  });

  function unitEl(value, label) {
    const wrap = document.createElement('div');
    wrap.className = 'unit';
    const v = document.createElement('div');
    v.className = 'value';
    v.textContent = String(value).padStart(2, '0');
    const l = document.createElement('div');
    l.className = 'label';
    l.textContent = label;
    wrap.appendChild(v);
    wrap.appendChild(l);
    return wrap;
  }

  function render() {
    const now = new Date();
    cards.forEach(({ date, card, timer }) => {
      const diff = date - now;
      if (diff <= 0) {
        card.classList.add('passed');
        timer.innerHTML = '';
        const passed = document.createElement('div');
        passed.className = 'passed-text';
        passed.textContent = 'Arrived';
        timer.appendChild(passed);
        return;
      }
      card.classList.remove('passed');
      const totalDays = Math.floor(diff / 86400000);
      timer.innerHTML = '';

      if (totalDays > 182) {
        let months = 0;
        let cursor = new Date(now);
        while (true) {
          const next = new Date(cursor);
          next.setMonth(next.getMonth() + 1);
          if (next <= date) { cursor = next; months++; } else break;
        }
        const remainMs = date - cursor;
        const remainDays = Math.floor(remainMs / 86400000);
        const weeks = Math.floor(remainDays / 7);
        const days = remainDays % 7;
        const leftoverMs = remainMs - remainDays * 86400000;
        const hours = Math.floor(leftoverMs / 3600000);
        const minutes = Math.floor((leftoverMs % 3600000) / 60000);
        const seconds = Math.floor((leftoverMs % 60000) / 1000);

        timer.appendChild(unitEl(months, 'mos'));
        timer.appendChild(unitEl(weeks, 'wks'));
        timer.appendChild(unitEl(days, 'days'));
        timer.appendChild(unitEl(hours, 'hrs'));
        timer.appendChild(unitEl(minutes, 'min'));
        timer.appendChild(unitEl(seconds, 'sec'));
      } else {
        const totalSeconds = Math.floor(diff / 1000);
        const weeks = Math.floor(totalSeconds / 604800);
        const days = Math.floor((totalSeconds % 604800) / 86400);
        const hours = Math.floor((totalSeconds % 86400) / 3600);
        const minutes = Math.floor((totalSeconds % 3600) / 60);
        const seconds = totalSeconds % 60;

        timer.appendChild(unitEl(weeks, 'wks'));
        timer.appendChild(unitEl(days, 'days'));
        timer.appendChild(unitEl(hours, 'hrs'));
        timer.appendChild(unitEl(minutes, 'min'));
        timer.appendChild(unitEl(seconds, 'sec'));
      }
    });
  }

  render();
  setInterval(render, 1000);
</script>

  
</body>
</html>
